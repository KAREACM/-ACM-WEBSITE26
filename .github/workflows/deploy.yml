name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 🔨 Install Dependencies
      run: npm install

    - name: 🏗️ Build Project
      run: npm run build

    - name: 📦 Install sshpass
      run: sudo apt-get install -y sshpass

    - name: 🚀 Deploy to cPanel via SFTP
      env:
        SSHPASS: ${{ secrets.FTP_PASSWORD }}
      run: |
        sshpass -e scp -o StrictHostKeyChecking=no -r ./dist/* ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/${{ secrets.FTP_USERNAME }}/public_html/
